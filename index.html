  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5f0;
      --panel: #fffefa;
      --ink: #15120e;
      --muted: #6f675d;
      --line: #ded8cf;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(calc(100% - 32px), 520px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 22px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.05;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      margin-top: 16px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
      font-size: 14px;
      font-weight: 850;
    }
  </style>
